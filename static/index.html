<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开发者工具箱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; display: flex; height: 100vh; background: #1e1e1e; color: #d4d4d4; }
        .sidebar { width: 300px; background: #252526; border-right: 1px solid #3c3c3c; display: flex; flex-direction: column; }
        .sidebar-title { padding: 15px; font-size: 16px; font-weight: bold; border-bottom: 1px solid #3c3c3c; }
        .tool-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #2d2d2d; transition: background 0.2s; }
        .tool-item:hover { background: #2a2d2e; }
        .tool-item.active { background: #37373d; border-left: 3px solid #007acc; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .tool-panel { display: none; }
        .tool-panel.active { display: block; max-width: 1400px; }
        .tool-title { font-size: 24px; margin-bottom: 25px; color: #fff; }
        label { display: block; margin-bottom: 10px; font-size: 14px; color: #9cdcfe; }
        input, textarea { width: 100%; padding: 12px 15px; margin-bottom: 20px; background: #3c3c3c; border: 1px solid #3c3c3c; color: #d4d4d4; border-radius: 4px; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #007acc; }
        textarea { height: 250px; font-family: 'Consolas', 'Monaco', monospace; resize: vertical; }
        textarea#json-input { height: 300px; }
        textarea#diff-original, textarea#diff-new { height: 400px; }
        input[type="text"] { height: 45px; }
        button { padding: 10px 20px; background: #0e639c; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-right: 10px; margin-bottom: 10px; }
        button:hover { background: #1177bb; }
        .result { padding: 15px; background: #252526; border-radius: 4px; margin-top: 15px; white-space: pre-wrap; font-family: 'Consolas', 'Monaco', monospace; }
        .btn-group { margin-bottom: 15px; }
        #json-output { margin-bottom: 15px; min-height: 50px; }
        #json-output pre { margin: 0; padding: 15px; background: #282c34; border-radius: 4px; overflow: auto; max-height: 400px; }
        #json-output code { font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; }
        .json-key { color: #e06c75; }
        .json-string { color: #98c379; }
        .json-number { color: #d19a66; }
        .json-boolean { color: #56b6c2; }
        .json-null { color: #c678dd; }
        .diff-container { display: flex; gap: 30px; }
        .diff-panel { flex: 1; }
        .diff-output { margin-top: 20px; }
        .diff-output pre { margin: 0; padding: 20px; background: #282c34; border-radius: 4px; overflow: auto; max-height: 600px; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
        .diff-add { background: rgba(72, 199, 142, 0.2); color: #98c379; }
        .diff-remove { background: rgba(224, 108, 117, 0.2); color: #e06c75; }
        .diff-line { display: block; }
        .snapshot-panel { background: #252526; border-bottom: 1px solid #3c3c3c; max-height: 200px; display: flex; flex-direction: column; }
        .snapshot-header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3c3c3c; }
        .snapshot-title { font-size: 13px; font-weight: bold; }
        .snapshot-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        .snapshot-item { padding: 8px 12px; background: #2d2d2d; border-radius: 4px; cursor: pointer; transition: background 0.2s; display: flex; flex-direction: column; min-width: 120px; }
        .snapshot-item:hover { background: #37373d; }
        .snapshot-item-name { font-size: 12px; margin-bottom: 3px; color: #d4d4d4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        .snapshot-item-time { font-size: 10px; color: #808080; }
        .snapshot-item-actions { display: flex; gap: 5px; margin-top: 5px; }
        .snapshot-item-actions button { padding: 2px 6px; font-size: 10px; margin: 0; }
        .snapshot-btn { padding: 6px 12px; font-size: 12px; background: #4a9e4a; }
        .snapshot-btn:hover { background: #5ab85a; }
        .snapshot-delete-btn { background: #e06c75; }
        .snapshot-delete-btn:hover { background: #c45d69; }
        .input-group { position: relative; }
        .input-group textarea, .input-group input[type="text"] { padding-right: 40px; }
        .copy-btn { position: absolute; right: 8px; top: 8px; background: transparent; border: none; color: #808080; cursor: pointer; padding: 4px; font-size: 16px; margin: 0; }
        .copy-btn:hover { color: #d4d4d4; background: transparent; }
        .output-group { position: relative; }
        .output-group .result, .output-group pre { padding-right: 40px; }
        .output-group .copy-btn { top: 10px; }
        .csv-table-container { overflow: auto; max-height: 500px; margin-top: 15px; border: 1px solid #3c3c3c; }
        .csv-table { border-collapse: collapse; width: 100%; font-size: 14px; }
        .csv-table th, .csv-table td { border: 1px solid #3c3c3c; padding: 8px 12px; text-align: left; white-space: pre-wrap; }
        .csv-table th { background: #2d2d2d; color: #9cdcfe; }
        .csv-table td { background: #252526; vertical-align: top; }
        .csv-table td:focus-within { outline: 2px solid #007acc; outline-offset: -2px; }
        .csv-table tr:hover td { background: #2a2d2e; }
        .csv-table td textarea { background: transparent; border: none; color: inherit; font: inherit; padding: 0; margin: 0; width: 100%; resize: none; outline: none; box-sizing: border-box; display: block; line-height: 1.4; height: auto; overflow: hidden; }
        .csv-table td textarea:focus { outline: none; }
        .csv-table th[contenteditable], .csv-table td[contenteditable] { -moz-appearance: textfield; }
        .csv-table .spacer-row td { background: transparent; padding: 0; border: none; }
        .csv-table-container { overflow: auto; max-height: 500px; margin-top: 15px; border: 1px solid #3c3c3c; position: relative; }
        .csv-table thead { position: sticky; top: 0; z-index: 10; }
        .csv-table .row-indicator { width: 50px; min-width: 50px; text-align: center; color: #808080; background: #2d2d2d !important; user-select: none; }
        .csv-context-menu { position: absolute; background: #252526; border: 1px solid #3c3c3c; box-shadow: 0 4px 8px rgba(0,0,0,0.3); z-index: 1000; min-width: 150px; }
        .csv-context-menu-item { padding: 8px 15px; cursor: pointer; font-size: 13px; color: #d4d4d4; }
        .csv-context-menu-item:hover { background: #094771; }
        .csv-context-menu-divider { height: 1px; background: #3c3c3c; margin: 4px 0; }
        .file-picker-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .file-picker-overlay.active { display: flex; }
        .file-picker { background: #252526; border: 1px solid #3c3c3c; border-radius: 8px; width: 600px; max-height: 80vh; display: flex; flex-direction: column; }
        .file-picker-header { padding: 15px; border-bottom: 1px solid #3c3c3c; display: flex; justify-content: space-between; align-items: center; }
        .file-picker-title { font-size: 16px; font-weight: bold; }
        .file-picker-close { background: none; border: none; color: #808080; cursor: pointer; font-size: 20px; padding: 0; }
        .file-picker-path { padding: 10px 15px; background: #2d2d2d; font-size: 13px; color: #9cdcfe; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-picker-list { flex: 1; overflow-y: auto; padding: 10px; }
        .file-picker-item { padding: 8px 12px; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .file-picker-item:hover { background: #37373d; }
        .file-picker-item.directory { color: #d4d4d4; }
        .file-picker-item.file { color: #9cdcfe; }
        .file-picker-item-icon { width: 16px; text-align: center; }
        .file-picker-footer { padding: 15px; border-top: 1px solid #3c3c3c; display: flex; gap: 10px; justify-content: flex-end; }
        .csv-diff-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .csv-diff-overlay.active { display: flex; }
        .csv-diff-modal { background: #252526; border: 1px solid #3c3c3c; border-radius: 8px; width: 700px; max-height: 80vh; display: flex; flex-direction: column; }
        .csv-diff-header { padding: 15px; border-bottom: 1px solid #3c3c3c; display: flex; justify-content: space-between; align-items: center; }
        .csv-diff-title { font-size: 16px; font-weight: bold; }
        .csv-diff-close { background: none; border: none; color: #808080; cursor: pointer; font-size: 20px; padding: 0; }
        .csv-diff-content { flex: 1; overflow-y: auto; padding: 15px; max-height: 60vh; white-space: pre-wrap; word-break: break-all; }
        .csv-diff-table { border-collapse: collapse; width: 100%; font-size: 13px; }
        .csv-diff-table th { background: #2d2d2d; color: #9cdcfe; padding: 6px 10px; text-align: left; border: 1px solid #3c3c3c; position: sticky; top: 0; z-index: 1; }
        .csv-diff-table th.th-changed { background: rgba(50, 50, 50, 0.3); color: #d4d4d4; }
        .csv-diff-table th.th-removed { background: rgba(180, 50, 50, 0.4); color: #f48771; }
        .csv-diff-table th.th-added { background: rgba(40, 120, 40, 0.4); color: #4ec94e; }
        .csv-diff-table td { padding: 4px 8px; border: 1px solid #3c3c3c; vertical-align: top; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-width: 400px; min-width: 100px; }
        .csv-diff-table tr:hover td { background: #2a2d2e; }
        .csv-diff-table td.cell-changed { background: rgba(50, 50, 50, 0.3); }
        .csv-diff-table td.cell-header-changed { background: rgba(200, 150, 50, 0.2); }
        .csv-diff-table td.cell-same { background: #252526; color: #808080; }
        .csv-diff-table td.cell-removed { background: rgba(180, 50, 50, 0.3); color: #f48771; text-decoration: line-through; }
        .csv-diff-table td.cell-added { background: rgba(40, 120, 40, 0.3); color: #4ec94e; }
        .csv-diff-table .row-indicator { width: 40px; text-align: center; color: #808080; background: #2d2d2d; font-size: 12px; }
        .csv-diff-table .diff-added { color: #4ec94e; background: rgba(40, 120, 40, 0.3); }
        .csv-diff-table .diff-removed { color: #f48771; background: rgba(180, 50, 50, 0.3); text-decoration: line-through; }
        .csv-diff-table .diff-equal { color: #808080; }
        .csv-diff-footer { padding: 15px; border-top: 1px solid #3c3c3c; display: flex; gap: 10px; justify-content: flex-end; }
        .csv-diff-footer button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .csv-diff-footer .btn-cancel { background: #3c3c3c; color: #d4d4d4; }
        .csv-diff-footer .btn-confirm { background: #0e639c; color: #fff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-title">工具列表</div>
        <div class="tool-item active" data-tool="json">JSON 格式化</div>
        <div class="tool-item" data-tool="timestamp">时间戳转换</div>
        <div class="tool-item" data-tool="json-extract">JSON 提取</div>
        <div class="tool-item" data-tool="diff">文本比较器</div>
        <div class="tool-item" data-tool="url-encode">URL 编解码</div>
        <div class="tool-item" data-tool="unescape">字符串转义</div>
        <div class="tool-item" data-tool="json-key-case">JSON Key 命名</div>
        <div class="tool-item" data-tool="csv">CSV 表格</div>
        <div class="tool-item" data-tool="base64">Base64 编解码</div>
        <div id="diy-tools-section" style="display: none;">
            <div class="sidebar-title" style="padding: 15px; font-size: 14px; border-top: 1px solid #3c3c3c;">自定义工具</div>
            <div id="diy-tools-list"></div>
        </div>
    </div>
    <div class="layout">
        <div class="main-content">
            <div class="content tool-content">
                <div id="json" class="tool-panel active">
                    <div class="tool-title">JSON 格式化</div>
                    <button class="snapshot-btn" onclick="saveSnapshot('json')">💾 保存 Snapshot</button>
                    <label>输入 JSON:</label>
                    <div class="input-group">
                        <textarea id="json-input" placeholder='{"key": "value"}'></textarea>
                        <button class="copy-btn" onclick="copyToClipboard('json-input')">📋</button>
                    </div>
                    <button onclick="formatJSON()">格式化</button>
                    <button onclick="minifyJSON()">压缩</button>
                    <label>输出结果:</label>
                    <div class="output-group">
                        <div id="json-output"></div>
                        <button class="copy-btn" onclick="copyOutputToClipboard('json-output')">📋</button>
                    </div>
                </div>
                <div id="timestamp" class="tool-panel">
                    <div class="tool-title">时间戳转换</div>
                    <button class="snapshot-btn" onclick="saveSnapshot('timestamp')">💾 保存 Snapshot</button>
                    <label>时间戳 (秒):</label>
                    <div class="input-group">
                        <input type="text" id="ts-input" placeholder="输入时间戳...">
                        <button class="copy-btn" onclick="copyToClipboard('ts-input')">📋</button>
                    </div>
                    <label>时间戳 (毫秒):</label>
                    <div class="input-group">
                        <input type="text" id="ts-ms-input" placeholder="输入毫秒时间戳...">
                        <button class="copy-btn" onclick="copyToClipboard('ts-ms-input')">📋</button>
                    </div>
                    <label>时间 (格式: 2006-01-02 15:04:05):</label>
                    <div class="input-group">
                        <input type="text" id="dt-input" placeholder="输入时间...">
                        <button class="copy-btn" onclick="copyToClipboard('dt-input')">📋</button>
                    </div>
                    <div class="btn-group">
                        <button onclick="tsToTime()">时间戳转时间</button>
                        <button onclick="tsMsToTime()">毫秒时间戳转时间</button>
                        <button onclick="timeToTs()">时间转时间戳</button>
                        <button onclick="getNow()">获取当前时间</button>
                    </div>
                    <div class="output-group">
                        <div id="ts-result" class="result"></div>
                        <button class="copy-btn" onclick="copyOutputToClipboard('ts-result')">📋</button>
                    </div>
                </div>
                <div id="json-extract" class="tool-panel">
                    <div class="tool-title">JSON 提取</div>
                    <button class="snapshot-btn" onclick="saveSnapshot('json-extract')">💾 保存 Snapshot</button>
                    <label>JSON 内容:</label>
                    <div class="input-group">
                        <textarea id="json-extract-input" placeholder='[{"name": "lijinlong", "obj": {"key1": 123}}]'></textarea>
                        <button class="copy-btn" onclick="copyToClipboard('json-extract-input')">📋</button>
                    </div>
                    <label>提取表达式 (如: [*].obj.key1):</label>
                    <div class="input-group">
                        <input type="text" id="json-extract-path" placeholder="[*].obj.key1">
                        <button class="copy-btn" onclick="copyToClipboard('json-extract-path')">📋</button>
                    </div>
                    <button onclick="extractJSON()">提取</button>
                    <button onclick="extractJSONAsLines()">提取成行</button>
                    <button onclick="clearJsonExtract()">清空</button>
                    <label>提取结果:</label>
                    <div class="output-group">
                        <div id="json-extract-output"></div>
                        <button class="copy-btn" onclick="copyOutputToClipboard('json-extract-output')">📋</button>
                    </div>
                </div>
                <div id="diff" class="tool-panel">
                    <div class="tool-title">文本比较器</div>
                    <button class="snapshot-btn" onclick="saveSnapshot('diff')">💾 保存 Snapshot</button>
                    <div class="diff-container">
                        <div class="diff-panel">
                            <label>原始文本:</label>
                            <div class="input-group">
                                <textarea id="diff-original" placeholder="输入原始文本..."></textarea>
                                <button class="copy-btn" onclick="copyToClipboard('diff-original')">📋</button>
                            </div>
                        </div>
                        <div class="diff-panel">
                            <label>新文本:</label>
                            <div class="input-group">
                                <textarea id="diff-new" placeholder="输入新文本..."></textarea>
                                <button class="copy-btn" onclick="copyToClipboard('diff-new')">📋</button>
                            </div>
                        </div>
                    </div>
                    <button onclick="compareDiff()">比较</button>
                    <button onclick="clearDiff()">清空</button>
                    <div class="diff-output">
                        <label>比较结果 (红色=删除, 绿色=新增):</label>
                        <div class="output-group">
                            <div id="diff-result"></div>
                            <button class="copy-btn" onclick="copyOutputToClipboard('diff-result')">📋</button>
                        </div>
                    </div>
                </div>
                <div id="url-encode" class="tool-panel">
                    <div class="tool-title">URL 编解码</div>
                    <button class="snapshot-btn" onclick="saveSnapshot('url-encode')">💾 保存 Snapshot</button>
                    <label>输入内容:</label>
                    <div class="input-group">
                        <textarea id="url-encode-input" placeholder="输入需要编码或解码的内容..."></textarea>
                        <button class="copy-btn" onclick="copyToClipboard('url-encode-input')">📋</button>
                    </div>
                    <button onclick="urlEncode()">URL 编码</button>
                    <button onclick="urlDecode()">URL 解码</button>
                    <button onclick="clearUrlEncode()">清空</button>
                    <label>输出结果:</label>
                    <div class="output-group">
                        <div id="url-encode-output"></div>
                        <button class="copy-btn" onclick="copyOutputToClipboard('url-encode-output')">📋</button>
                    </div>
                </div>
                <div id="unescape" class="tool-panel">
                    <div class="tool-title">字符串转义</div>
                    <button class="snapshot-btn" onclick="saveSnapshot('unescape')">💾 保存 Snapshot</button>
                    <label>输入内容 (双引号内的转义字符串):</label>
                    <div class="input-group">
                        <textarea id="unescape-input" placeholder="输入需要转义的字符串，如: \\\"ddddd\\\""></textarea>
                        <button class="copy-btn" onclick="copyToClipboard('unescape-input')">📋</button>
                    </div>
                    <button onclick="doUnescape()">转义</button>
                    <button onclick="doEscape()">还原</button>
                    <button onclick="clearUnescape()">清空</button>
                    <label>输出结果:</label>
                    <div class="output-group">
                        <div id="unescape-output" class="result"></div>
                        <button class="copy-btn" onclick="copyOutputToClipboard('unescape-output')">📋</button>
                    </div>
                </div>
                <div id="json-key-case" class="tool-panel">
                    <div class="tool-title">JSON Key 命名</div>
                    <button class="snapshot-btn" onclick="saveSnapshot('json-key-case')">💾 保存 Snapshot</button>
                    <label>输入 JSON:</label>
                    <div class="input-group">
                        <textarea id="json-key-input" placeholder='{"snake_case_key": "value"}'></textarea>
                        <button class="copy-btn" onclick="copyToClipboard('json-key-input')">📋</button>
                    </div>
                    <button onclick="convertJsonKeyToCamel()">下划线 → 驼峰</button>
                    <button onclick="convertJsonKeyToSnake()">驼峰 → 下划线</button>
                    <button onclick="clearJsonKey()">清空</button>
                    <label>输出结果:</label>
                    <div class="output-group">
                        <div id="json-key-output" class="result"></div>
                        <button class="copy-btn" onclick="copyOutputToClipboard('json-key-output')">📋</button>
                    </div>
                </div>
                <div id="csv" class="tool-panel">
                    <div class="tool-title">CSV 表格</div>
                    <button onclick="openCSVFilePicker()">打开 CSV</button>
                    <input type="file" id="csv-file-input" accept=".csv" onchange="loadCSVFile()" style="position:absolute;opacity:0;z-index:-1;">
                    <button onclick="saveCSV()">保存 CSV</button>
                    <button onclick="undoCsv()">撤销</button>
                    <div id="csv-file-path" class="csv-file-path" style="margin: 10px 0; font-size: 12px; color: #9cdcfe; word-break: break-all;"></div>
                    <div class="csv-table-container">
                        <table id="csv-table" class="csv-table"></table>
                    </div>
                    <div id="csv-context-menu" class="csv-context-menu" style="display:none;"></div>
                </div>

                <div id="file-picker-overlay" class="file-picker-overlay">
                    <div class="file-picker">
                        <div class="file-picker-header">
                            <span class="file-picker-title">选择文件</span>
                            <button class="file-picker-close" onclick="closeFilePicker()">×</button>
                        </div>
                        <div class="file-picker-path" id="file-picker-path"></div>
                        <div class="file-picker-list" id="file-picker-list"></div>
                        <div class="file-picker-footer">
                            <button onclick="closeFilePicker()">取消</button>
                        </div>
                    </div>
                </div>

                <div id="csv-diff-overlay" class="csv-diff-overlay">
                    <div class="csv-diff-modal">
                        <div class="csv-diff-header">
                            <span class="csv-diff-title">保存预览</span>
                            <button class="csv-diff-close" onclick="closeCsvDiff()">×</button>
                        </div>
                        <div class="csv-diff-content" id="csv-diff-content"></div>
                        <div class="csv-diff-footer">
                            <button class="btn-cancel" onclick="closeCsvDiff()">取消</button>
                            <button class="btn-confirm" onclick="confirmCsvSave()">确认保存</button>
                        </div>
                    </div>
                </div>
                <div id="base64" class="tool-panel">
                    <div class="tool-title">Base64 编解码</div>
                    <button class="snapshot-btn" onclick="saveSnapshot('base64')">💾 保存 Snapshot</button>
                    <label>输入内容:</label>
                    <div class="input-group">
                        <textarea id="base64-input" placeholder="输入需要编码或解码的内容..."></textarea>
                        <button class="copy-btn" onclick="copyToClipboard('base64-input')">📋</button>
                    </div>
                    <button onclick="base64Encode()">Base64 编码</button>
                    <button onclick="base64Decode()">Base64 解码</button>
                    <button onclick="clearBase64()">清空</button>
                    <label>输出结果:</label>
                    <div class="output-group">
                        <div id="base64-output" class="result"></div>
                        <button class="copy-btn" onclick="copyOutputToClipboard('base64-output')">📋</button>
                    </div>
                </div>
                <div id="diy-panels"></div>
            </div>
            <div class="snapshot-panel">

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function highlightJSON(json) {
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                        return '<span class="' + cls + '">' + escapeHtml(match) + '</span>';
                    } else {
                        cls = 'json-string';
                        return '<span class="' + cls + '">' + escapeHtml(match) + '</span>';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // JSON 提取
        function extractJSON() {
            const input = document.getElementById('json-extract-input').value.trim();
            const path = document.getElementById('json-extract-path').value.trim();
            if (!input || !path) return;
            
            try {
                const json = JSON.parse(input);

                document.getElementById('json-extract-output').innerHTML = '<pre><code>' + highlightJSON(output) + '</code></pre>';

        function extractJSONAsLines() {
            const input = document.getElementById('json-extract-input').value.trim();
            const path = document.getElementById('json-extract-path').value.trim();
            if (!input || !path) return;
            
            try {
                const json = JSON.parse(input);
                const result = extractByPath(json, path);
                const lines = result.map(item => {
                    if (typeof item === 'object') {
                        return JSON.stringify(item);
                    }
                    return String(item);
                }).join('\n');
                document.getElementById('json-extract-output').innerHTML = '<pre><code>' + escapeHtml(lines) + '</code></pre>';
            } catch (e) {
                document.getElementById('json-extract-output').innerHTML = '<div class="result" style="color: #e06c75;">错误: ' + e.message + '</div>';
            }
        }

        function extractByPath(json, path) {
            const parts = path.split('.');
            let current = [json];
            
            for (const part of parts) {
                if (part === '') continue;
                
                const starMatch = part.match(/^\[(\*)\]$/);
                const indexMatch = part.match(/^\[(\d+)\]$/);
                
                if (starMatch) {
                    const newCurrent = [];
                    for (const item of current) {
                        if (Array.isArray(item)) {
                            newCurrent.push(...item);
                        } else if (item !== undefined && item !== null) {
                            newCurrent.push(item);
                        }
                    }
                    current = newCurrent;
                } else if (indexMatch) {
                    const index = parseInt(indexMatch[1]);
                    current = current.map(item => item !== undefined && item !== null ? item[index] : undefined).filter(x => x !== undefined);
                } else {
                    current = current.map(item => item !== undefined && item !== null ? item[part] : undefined).filter(x => x !== undefined);
                }
                
                if (current.length === 0) break;
            }
            
            return current;
        }

        // 文本比较
        function compareDiff() {
            const original = document.getElementById('diff-original').value;
            const newText = document.getElementById('diff-new').value;
            
            const diff = computeDiff(original, newText);
            let result = '';
            
            for (const line of diff) {
                if (line.type === 'added') {
                    result += '<span class="diff-line diff-add">+ ' + escapeHtml(line.value) + '</span>';
                } else if (line.type === 'removed') {
                    result += '<span class="diff-line diff-remove">- ' + escapeHtml(line.value) + '</span>';
                } else {
                    result += '<span class="diff-line">  ' + escapeHtml(line.value) + '</span>';
                }
            }
            
            document.getElementById('diff-result').innerHTML = '<pre>' + result + '</pre>';
        }

        function computeDiff(text1, text2) {
            const lines1 = text1.split('\n');
            const lines2 = text2.split('\n');
            const m = lines1.length;
            const n = lines2.length;
            
            const dp = Array(m + 1).fill(null).map(() => Array(n + 1).fill(0));
            
            for (let i = 1; i <= m; i++) {
                dp[i][0] = i;
            }
            for (let j = 1; j <= n; j++) {
                dp[0][j] = j;
            }
            
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (lines1[i - 1] === lines2[j - 1]) {
                        dp[i][j] = dp[i - 1][j - 1];
                    } else {
                        dp[i][j] = Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]) + 1;
                    }
                }
            }
            
            const result = [];
            let i = m, j = n;
            
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && lines1[i - 1] === lines2[j - 1]) {
                    result.unshift({ type: 'unchanged', value: lines1[i - 1] });
                    i--; j--;
                } else if (j > 0 && (i === 0 || dp[i][j - 1] <= dp[i - 1][j] && dp[i][j - 1] <= dp[i - 1][j - 1])) {
                    result.unshift({ type: 'added', value: lines2[j - 1] });
                    j--;
                } else if (i > 0 && (j === 0 || dp[i - 1][j] < dp[i][j - 1] || dp[i - 1][j] <= dp[i - 1][j - 1])) {
                    result.unshift({ type: 'removed', value: lines1[i - 1] });
                    i--;
                } else {
                    result.unshift({ type: 'removed', value: lines1[i - 1] });
                    result.unshift({ type: 'added', value: lines2[j - 1] });
                    i--; j--;
                }
            }
            
            return result;
        }

        function convertJsonKeyToSnake() {
            const input = document.getElementById('json-key-input').value.trim();

                alert('请输入 JSON');

            try {
                const obj = JSON.parse(input);

                document.getElementById('json-key-output').innerHTML = '<div class="result" style="color: #e06c75;">错误: ' + escapeHtml(e.message) + '</div>';
            }
        }

        function convertKeysToCamel(obj) {
            if (Array.isArray(obj)) {
                return obj.map(item => convertKeysToCamel(item));
            } else if (obj !== null && typeof obj === 'object') {
                const result = {};
                for (const key in obj) {
                    const camelKey = key.replace(/_([a-z])/g, (_, letter) => letter.toUpperCase());
                    result[camelKey] = convertKeysToCamel(obj[key]);
                }
                return result;
            }
            return obj;
        }

        function convertKeysToSnake(obj) {
            if (Array.isArray(obj)) {
                return obj.map(item => convertKeysToSnake(item));
            } else if (obj !== null && typeof obj === 'object') {
                const result = {};
                for (const key in obj) {
                    const snakeKey = key.replace(/([A-Z])/g, '_$1').toLowerCase();
                    result[snakeKey] = convertKeysToSnake(obj[key]);
                }
                return result;
            }
            return obj;
        }

        async function loadFilePicker(path) {
            currentPickerPath = path;
            document.getElementById('file-picker-path').textContent = path;
            
            try {
                const response = await fetch('/api/list-dir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },

                    const parentItem = document.createElement('div');

                    parentItem.onclick = () => loadFilePicker(path.split('/').slice(0, -1).join('/') || '/');
