                }
                
                entries.sort((a, b) => {
                    if (a.isDir && !b.isDir) return -1;
                    if (!a.isDir && b.isDir) return 1;
                    return a.name.localeCompare(b.name);
                });
                
                for (const entry of entries) {
                    if (entry.isDir || entry.name.endsWith('.csv') || entry.name.endsWith('.txt')) {
                        const item = document.createElement('div');
                        item.className = 'file-picker-item ' + (entry.isDir ? 'directory' : 'file');
                        item.innerHTML = '<span class="file-picker-item-icon">' + (entry.isDir ? '📁' : '📄') + '</span>' + entry.name;
                        
                        if (entry.isDir) {
                            item.onclick = () => loadFilePicker(path + '/' + entry.name);
                        } else {
                            item.onclick = () => selectFile(path + '/' + entry.name);
                        }
                        list.appendChild(item);
                    }
                }
            } catch (e) {
                console.error('加载目录失败:', e);
            }
        }

        async function selectFile(filePath) {
            const dirPath = filePath.substring(0, filePath.lastIndexOf('/'));
            lastOpenedPath = dirPath || '/';
            
            if (isSelectingForSave) {
                csvFileHandle = { path: filePath, name: filePath.split('/').pop() };
                closeFilePicker();
                await saveCSVToPath(filePath);
            } else {
                try {
                    const response = await fetch('/api/read-file', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: filePath })
                    });
                    const result = await response.json();
                    if (result.error) {
                        alert('读取文件失败: ' + result.error);
                        return;
                    }
                    csvFileHandle = { path: filePath, name: filePath.split('/').pop() };
                    document.getElementById('csv-file-path').textContent = filePath;
                    parseCSV(result.content);
                    csvOriginalData = JSON.parse(JSON.stringify(csvData));
                    closeFilePicker();
                } catch (e) {
                    alert('读取文件失败: ' + e.message);
                }
            }
        }

        function closeFilePicker() {
            document.getElementById('file-picker-overlay').classList.remove('active');
        }

        async function saveCSVToPath(filePath) {
            const content = csvToString();
            if (!content) {
                alert('没有数据可保存');
                return;
            }
            
            try {
                const response = await fetch('/api/save-file', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: content, filename: filePath })
                });
                if (!response.ok) {
                    alert('保存失败');
                    return;
                }
                alert('保存成功');
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        async function loadCSVFile() {
            const fileInput = document.getElementById('csv-file-input');
            const file = fileInput.files[0];
            if (!file) return;
            
            csvFileHandle = { name: file.name, handle: null };
            
            const content = await file.text();
            parseCSV(content);
            csvOriginalData = JSON.parse(JSON.stringify(csvData));
        }

        function parseCSV(text) {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentCell += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell);
                    currentCell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') {
                        i++;
                    }
                    currentRow.push(currentCell);
                    rows.push(currentRow);
                    currentRow = [];
                    currentCell = '';
                } else {
                    currentCell += char;
                }
            }
            
            currentRow.push(currentCell);
            if (currentRow.some(cell => cell !== '')) {
                rows.push(currentRow);
            }
            
            csvData = rows;
            renderCSVTable();
        }

        function renderCSVTable(targetScrollTop) {
            const table = document.getElementById('csv-table');
            const container = table.closest('.csv-table-container');
            table.innerHTML = '';
            
            if (csvData.length === 0) return;

            const savedScrollTop = targetScrollTop !== undefined ? targetScrollTop : (csvVirtualScroll ? csvVirtualScroll.scrollTop : 0);

            if (!csvVirtualScroll) {
                csvVirtualScroll = {
                    scrollTop: savedScrollTop,
                    rowHeight: 28,
                    visibleRows: Math.ceil(500 / 28) + 10,
                    bufferRows: 5,
                    startIndex: 1,
                    endIndex: 1,
                    rowHeights: new Map(),
                    totalHeight: 0,
                    container: container
                };
                container.addEventListener('scroll', handleScroll);
            } else {
                csvVirtualScroll.scrollTop = savedScrollTop;
                csvVirtualScroll.startIndex = 1;
                csvVirtualScroll.endIndex = 1;
                csvVirtualScroll.totalHeight = 0;
            }

            csvVirtualScroll.totalHeight = calculateTotalHeight();
            
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const rowIndicatorHeader = document.createElement('th');
            rowIndicatorHeader.className = 'row-indicator';
            rowIndicatorHeader.textContent = '#';
            headerRow.appendChild(rowIndicatorHeader);
            csvData[0].forEach((cell, index) => {
                const th = document.createElement('th');
                th.contentEditable = true;
                th.innerText = cell;
                th.dataset.col = index;
                th.addEventListener('blur', function() {
                    let content = this.innerText || this.textContent;
                    csvData[0][this.dataset.col] = content;
                });
                th.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    showCsvContextMenu(e.clientX, e.clientY, 'header', index);
                });
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            tbody.id = 'csv-tbody';
            table.appendChild(tbody);

            csvVirtualScroll.scrollTop = savedScrollTop;
            renderVisibleRows();
            container.scrollTop = savedScrollTop;
        }

        function calculateTotalHeight() {
            let height = 0;
            for (let i = 1; i < csvData.length; i++) {
                const cachedHeight = csvVirtualScroll.rowHeights.get(String(i));
                if (cachedHeight) {
                    height += cachedHeight;
                } else {
                    height += csvVirtualScroll.rowHeight;
                }
            }
            return height;
        }

        function getVisibleRange(scrollTop) {
            const container = csvVirtualScroll.container;
            const containerHeight = container.clientHeight;
            window.dbgGVR = {
                scrollTop,
                csvDataLength: csvData.length,
                rowHeightsSize: csvVirtualScroll.rowHeights.size,
                rowHeightsKeys: Array.from(csvVirtualScroll.rowHeights.keys()).sort((a,b) => parseInt(a)-parseInt(b)),
                rowHeight: csvVirtualScroll.rowHeight,
                bufferRows: csvVirtualScroll.bufferRows
            };
            
            let currentHeight = 0;
            let startIndex = 1;
            let endIndex = csvData.length - 1;
            
            for (let i = 1; i < csvData.length; i++) {
                const rowHeight = csvVirtualScroll.rowHeights.get(String(i)) || csvVirtualScroll.rowHeight;
                if (currentHeight + rowHeight >= scrollTop) {
                    startIndex = Math.max(1, i - csvVirtualScroll.bufferRows);
                    window.dbgGVR.firstPassBreak = { i, currentHeight, rowHeight, total: currentHeight + rowHeight, startIndex };
                    break;
                }
                currentHeight += rowHeight;
            }
            
            currentHeight = 0;
            for (let i = 1; i <= startIndex; i++) {
                currentHeight += csvVirtualScroll.rowHeights.get(String(i)) || csvVirtualScroll.rowHeight;
            }
            
            for (let i = startIndex; i < csvData.length; i++) {
                currentHeight += csvVirtualScroll.rowHeights.get(String(i)) || csvVirtualScroll.rowHeight;
                if (currentHeight >= scrollTop + containerHeight) {
                    endIndex = Math.min(csvData.length - 1, i + csvVirtualScroll.bufferRows);
                    window.dbgGVR.thirdPassBreak = { i, currentHeight, endIndex };
                    break;
                }
            }
            
            return { startIndex, endIndex };
        }

        function renderVisibleRows(overrideStartIndex, overrideEndIndex) {
            const tbody = document.getElementById('csv-tbody');
            let startIndex, endIndex;
            
            if (overrideStartIndex !== undefined && overrideEndIndex !== undefined) {
                startIndex = overrideStartIndex;
                endIndex = overrideEndIndex;
            } else {
                const range = getVisibleRange(csvVirtualScroll.scrollTop);
                startIndex = range.startIndex;
                endIndex = range.endIndex;
            }
            window.dbgRenderVR = { scrollTop: csvVirtualScroll.scrollTop, startIndex, endIndex, si: csvVirtualScroll.startIndex, ei: csvVirtualScroll.endIndex, rhSize: csvVirtualScroll.rowHeights.size, isOverride: overrideStartIndex !== undefined };
            
            // 如果有override参数或者startIndex/endIndex变化，需要重新渲染
            if (startIndex === csvVirtualScroll.startIndex && endIndex === csvVirtualScroll.endIndex && csvVirtualScroll.rowHeights.size > 0 && overrideStartIndex === undefined) {
                return;
            }
            
            csvVirtualScroll.startIndex = startIndex;
            csvVirtualScroll.endIndex = endIndex;
            
            tbody.innerHTML = '';
            
            if (startIndex > 1) {
                const topSpacer = document.createElement('tr');
                topSpacer.className = 'spacer-row';
                topSpacer.dataset.rows = '1-' + (startIndex - 1);
                const topTd = document.createElement('td');
                topTd.colSpan = csvData[0].length + 1;
                let topHeight = 0;
                for (let i = 1; i < startIndex; i++) {
                    topHeight += csvVirtualScroll.rowHeights.get(String(i)) || csvVirtualScroll.rowHeight;
                }
                topTd.style.height = topHeight + 'px';
                topTd.style.padding = '0';
                topTd.style.border = 'none';
                topSpacer.appendChild(topTd);
                tbody.appendChild(topSpacer);
            }
            
            for (let i = startIndex; i <= endIndex; i++) {
                const row = createTableRow(i);
                tbody.appendChild(row);
                row.offsetHeight;
                const textareas = row.querySelectorAll('td textarea');
                textareas.forEach(ta => {
                    ta.style.height = 'auto';
                    ta.style.height = ta.scrollHeight + 'px';
                });
                const rowHeight = row.offsetHeight;
                const key = String(i);
                if (csvVirtualScroll.rowHeights.get(key) !== rowHeight) {
                    csvVirtualScroll.rowHeights.set(key, rowHeight);
                    csvVirtualScroll.totalHeight = calculateTotalHeight();
                }
            }
            
            if (endIndex < csvData.length - 1) {
                const bottomSpacer = document.createElement('tr');
                bottomSpacer.className = 'spacer-row';
                bottomSpacer.dataset.rows = (endIndex + 1) + '-' + (csvData.length - 1);
                const bottomTd = document.createElement('td');
                bottomTd.colSpan = csvData[0].length + 1;
                let bottomHeight = 0;
                for (let i = endIndex + 1; i < csvData.length; i++) {
                    bottomHeight += csvVirtualScroll.rowHeights.get(String(i)) || csvVirtualScroll.rowHeight;
                }
                bottomTd.style.height = bottomHeight + 'px';
                bottomTd.style.padding = '0';
                bottomTd.style.border = 'none';
                bottomSpacer.appendChild(bottomTd);
                tbody.appendChild(bottomSpacer);
            }
        }

        function createTableRow(rowIndex) {
            const row = document.createElement('tr');
            row.dataset.row = rowIndex;
            row.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                showCsvContextMenu(e.clientX, e.clientY, 'row', rowIndex);
            });
            
            const indicator = document.createElement('td');
            indicator.className = 'row-indicator';
            indicator.textContent = rowIndex;
            row.appendChild(indicator);
            
            csvData[rowIndex].forEach((cell, index) => {
                const td = document.createElement('td');
                const textarea = document.createElement('textarea');
                textarea.value = cell;
                textarea.dataset.row = rowIndex;
                textarea.dataset.col = index;
                textarea.style.height = 'auto';
                textarea.addEventListener('input', function() {
                    this.style.height = '1px';
                    this.style.height = this.scrollHeight + 'px';
                    csvData[this.dataset.row][this.dataset.col] = this.value;
                    updateRowHeight(this.dataset.row);
                });
                textarea.addEventListener('change', function() {
                    csvData[this.dataset.row][this.dataset.col] = this.value;
                });
                textarea.addEventListener('focus', function() {
                    this.style.height = 'auto';
                    this.style.height = this.scrollHeight + 'px';
                });
                textarea.addEventListener('blur', function() {
                    const savedScrollTop = csvVirtualScroll.container.scrollTop;
                    updateRowHeight(this.dataset.row);
                    csvVirtualScroll.container.scrollTop = savedScrollTop;
                    csvVirtualScroll.scrollTop = savedScrollTop;
                });
                td.appendChild(textarea);
                row.appendChild(td);
            });
            
            return row;
        }

        function updateRowHeight(rowIndex) {
            const textareas = document.querySelectorAll(`tr[data-row="${rowIndex}"] td textarea`);
            if (textareas.length > 0) {
                let maxHeight = 0;
                textareas.forEach(ta => {
                    ta.style.height = 'auto';
                    const height = Math.max(ta.scrollHeight, 28);
                    ta.style.height = height + 'px';
                    if (height > maxHeight) {
                        maxHeight = height;
                    }
                });
                const key = String(rowIndex);
                if (csvVirtualScroll.rowHeights.get(key) !== maxHeight) {
                    csvVirtualScroll.rowHeights.set(key, maxHeight);
                    csvVirtualScroll.totalHeight = calculateTotalHeight();
                    updateSpacerHeights();
                }
            }
        }
        
        function updateSpacerHeights() {
            const tbody = document.getElementById('csv-tbody');
            if (!tbody) return;
            const spacerRows = tbody.querySelectorAll('.spacer-row');
            spacerRows.forEach(spacer => {
                const td = spacer.querySelector('td');
                if (!td) return;
                const rows = spacer.dataset.rows;
                if (!rows) return;
                const [start, end] = rows.split('-').map(Number);
                let height = 0;
                for (let i = start; i <= end; i++) {
                    height += csvVirtualScroll.rowHeights.get(String(i)) || csvVirtualScroll.rowHeight;
                }
                td.style.height = height + 'px';
            });
        }

        function measureRowHeightsBatch(startIndex, endIndex) {
            const fragment = document.createDocumentFragment();
            const tempRows = [];
            
            for (let i = startIndex; i <= endIndex; i++) {
                const row = createTableRow(i);
                row.style.position = 'absolute';
                row.style.left = '-9999px';
                fragment.appendChild(row);
                tempRows.push({row, index: i});
            }
            
            document.body.appendChild(fragment);
            
            const results = new Map();
            tempRows.forEach(({row, index}) => {
                const height = row.offsetHeight;
                results.set(String(index), height);
                document.body.removeChild(row);
            });
            
            return results;
        }

        function calculateAverageRowHeight() {
            let total = 0, count = 0;
            csvVirtualScroll.rowHeights.forEach(height => {
                total += height;
                count++;
            });
            return count > 0 ? Math.round(total / count) : csvVirtualScroll.rowHeight;
        }

        function ensureHeightsCachedUpTo(targetIndex, batchSize = 50) {
            if (targetIndex < 1) return;
            
            const missingIndices = [];
            for (let i = 1; i <= targetIndex; i++) {
                if (!csvVirtualScroll.rowHeights.has(String(i))) {
                    missingIndices.push(i);
                }
            }
            
            if (missingIndices.length === 0) return;
            
            const missingCount = missingIndices.length;
            if (missingCount > 200) {
                console.warn(`测量 ${missingCount} 行可能影响性能，使用平均高度估算`);
                const avgHeight = calculateAverageRowHeight();
                for (let i = 1; i <= targetIndex; i++) {
                    if (!csvVirtualScroll.rowHeights.has(String(i))) {
                        csvVirtualScroll.rowHeights.set(String(i), avgHeight);
                    }
                }
                return;
            }
            
            for (let i = 0; i < missingIndices.length; i += batchSize) {
                const batchStart = missingIndices[i];
                const batchEnd = Math.min(missingIndices[i + batchSize - 1], missingIndices[missingIndices.length - 1]);
                
                const batchResults = measureRowHeightsBatch(batchStart, batchEnd);
                batchResults.forEach((height, index) => {
                    csvVirtualScroll.rowHeights.set(index, height);
                });
            }
        }

        let scrollRAF = null;
        let skipNextScrollHandler = false;
        function handleScroll() {
            if (scrollRAF) return;
            scrollRAF = requestAnimationFrame(() => {
                if (skipNextScrollHandler) {
                    skipNextScrollHandler = false;
                    scrollRAF = null;
                    return;
                }
                const savedScrollTop = csvVirtualScroll.container.scrollTop;
                csvVirtualScroll.scrollTop = savedScrollTop;
                renderVisibleRows();
                csvVirtualScroll.container.scrollTop = savedScrollTop;
                scrollRAF = null;
            });
        }
        
        function showCsvContextMenu(x, y, type, index) {
            const menu = document.getElementById('csv-context-menu');
            menu.innerHTML = '';
            
            if (type === 'row') {
                menu.innerHTML = `
                    <div class="csv-context-menu-item" onclick="addCsvRowBefore(${index})">在此行之前添加行</div>
                    <div class="csv-context-menu-item" onclick="addCsvRowAfter(${index})">在此行之后添加行</div>
                    <div class="csv-context-menu-divider"></div>
                    <div class="csv-context-menu-item" onclick="deleteCsvRowByIndex(${index})">删除此行</div>
                `;
            } else if (type === 'column') {
                menu.innerHTML = `
                    <div class="csv-context-menu-item" onclick="addCsvColumnBefore(${index})">在此列之前添加列</div>
                    <div class="csv-context-menu-item" onclick="addCsvColumnAfter(${index})">在此列之后添加列</div>
                    <div class="csv-context-menu-divider"></div>
                    <div class="csv-context-menu-item" onclick="deleteCsvColumnByIndex(${index})">删除此列</div>
                `;
            } else if (type === 'header') {
                menu.innerHTML = `
                    <div class="csv-context-menu-item" onclick="addCsvRowAfterHeader()">在表头后添加行</div>
                    <div class="csv-context-menu-divider"></div>
                    <div class="csv-context-menu-item" onclick="addCsvColumnBefore(${index})">在此列之前添加列</div>
                    <div class="csv-context-menu-item" onclick="addCsvColumnAfter(${index})">在此列之后添加列</div>
                    <div class="csv-context-menu-divider"></div>
                    <div class="csv-context-menu-item" onclick="deleteCsvColumnByIndex(${index})">删除此列</div>
                `;
            }
            
            menu.style.display = 'block';
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            
            document.addEventListener('click', hideCsvContextMenu);
        }
        
        function hideCsvContextMenu() {
            document.getElementById('csv-context-menu').style.display = 'none';
            document.removeEventListener('click', hideCsvContextMenu);
        }

        function csvToString() {
            return csvData.map(row => 
                row.map(cell => {
                    if (cell.includes(',') || cell.includes('"') || cell.includes('\n')) {
                        return '"' + cell.replace(/"/g, '""') + '"';
                    }
                    return cell;
                }).join(',')
            ).join('\n');
        }

        let pendingSaveContent = '';

        async function saveCSV() {
            const content = csvToString();
            if (!content) {
                alert('没有数据可保存');
                return;
            }
            
            if (!csvFileHandle) {
                alert('请先打开一个CSV文件');
                return;
            }
            
            pendingSaveContent = content;
            
            try {
                if (csvFileHandle.handle && window.showSaveFilePicker) {
                    showCsvDiffPreview(csvOriginalData, csvData);
                } else if (csvFileHandle.path) {
                    showCsvDiffPreview(csvOriginalData, csvData);
                } else {
                    openCSVFilePicker(true);
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        function showCsvDiffPreview(origArray, modArray) {
            const oldContent = arrayToCSV(origArray);
            const newContent = arrayToCSV(modArray);
            
            fetch('/api/csv-diff', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ OldContent: oldContent, NewContent: newContent })
            })
            .then(response => response.json())
            .then(result => {
                renderCsvDiffPreview(result, origArray, modArray);
                document.getElementById('csv-diff-overlay').classList.add('active');
            })
            .catch(e => {
                alert('获取 diff 失败: ' + e.message);
            });
        }

        function renderCsvDiffPreview(result, origArray, modArray) {
            const container = document.getElementById('csv-diff-content');
            const origRows = origArray || [];
            const modRows = modArray || [];
            const { columns, rows } = result;
            
            let html = '<table class="csv-diff-table"><thead><tr><th class="row-indicator">行</th>';
            
            for (let c = 0; c < columns.length; c++) {
                const col = columns[c];
                if (col.status === 'removed') {
                    html += `<th class="th-removed">${escapeHtml(origRows[0]?.[col.orig_index] || '')}</th>`;
                } else if (col.status === 'added') {
                    html += `<th class="th-added">${escapeHtml(modRows[0]?.[col.new_index] || '')}</th>`;
                } else if (col.status === 'changed') {
                    html += `<th class="th-changed">${computeCellDiffFromApi(origRows[0]?.[col.orig_index], modRows[0]?.[col.new_index])}</th>`;
                } else {
                    html += `<th>${escapeHtml(modRows[0]?.[col.new_index] || origRows[0]?.[col.orig_index] || '')}</th>`;
                }
            }
            html += '</tr></thead><tbody>';
            
            for (let r = 0; r < rows.length; r++) {
                const row = rows[r];
                html += `<tr><td class="row-indicator">${r + 1}</td>`;
                
                for (let c = 0; c < columns.length; c++) {
                    const col = columns[c];
                    let origCell = '';
                    let modCell = '';
                    
                    const dataRowOrig = row.orig_index >= 0 ? row.orig_index + 1 : -1;
                    const dataRowMod = row.new_index >= 0 ? row.new_index + 1 : -1;
                    
                    if (col.status === 'removed' && dataRowOrig >= 0 && col.orig_index >= 0) {
                        origCell = origRows[dataRowOrig]?.[col.orig_index] || '';
                        html += `<td class="cell-removed">${escapeHtml(origCell)}</td>`;
                    } else if (col.status === 'added' && dataRowMod >= 0 && col.new_index >= 0) {
                        modCell = modRows[dataRowMod]?.[col.new_index] || '';
                        html += `<td class="cell-added">${escapeHtml(modCell)}</td>`;
                    } else if (col.status === 'changed') {
                        if (dataRowOrig >= 0 && col.orig_index >= 0) {
                            origCell = origRows[dataRowOrig]?.[col.orig_index] || '';
                        }
                        if (dataRowMod >= 0 && col.new_index >= 0) {
                            modCell = modRows[dataRowMod]?.[col.new_index] || '';
                        }
                        html += `<td class="cell-changed">${computeCellDiffFromApi(origCell, modCell)}</td>`;
                    } else {
                        if (dataRowOrig >= 0 && col.orig_index >= 0) {
                            origCell = origRows[dataRowOrig]?.[col.orig_index] || '';
                        }
                        if (dataRowMod >= 0 && col.new_index >= 0) {
                            modCell = modRows[dataRowMod]?.[col.new_index] || '';
                        }
                        if (row.status === 'same') {
                            if (origCell === modCell) {
                                html += `<td class="cell-same">${escapeHtml(origCell)}</td>`;
                            } else {
                                html += `<td class="cell-changed">${computeCellDiffFromApi(origCell, modCell)}</td>`;
                            }
                        } else if (row.status === 'changed') {
                            if (origCell === modCell) {
                                html += `<td class="cell-same">${escapeHtml(origCell)}</td>`;
                            } else {
                                html += `<td class="cell-changed">${computeCellDiffFromApi(origCell, modCell)}</td>`;
                            }
                        } else if (row.status === 'removed') {
                            html += `<td class="cell-removed">${escapeHtml(origCell)}</td>`;
                        } else if (row.status === 'added') {
                            html += `<td class="cell-added">${escapeHtml(modCell)}</td>`;
                        }
                    }
                }
                html += '</tr>';
            }
            
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        function computeCellDiffFromApi(orig, mod) {
            orig = (orig || '').toString().replace(/\r/g, '');
            mod = (mod || '').toString().replace(/\r/g, '');
            
            if (orig === mod) {
                return escapeHtml(orig) || '&nbsp;';
            }
            
            const diff = computeDiff(orig, mod);
            
            if (diff.length === 0) {
                return '&nbsp;';
            }
            
            return diff.map(d => {
                const type = d.type === 'unchanged' || d.type === 0 ? 0 
                             : d.type === 'removed' || d.type === -1 ? -1 
                             : 1;
                const line = d.value || d.line || '';
                if (type === 0) {
                    return ' ' + (escapeHtml(line) || '&nbsp;');
                } else if (type === -1) {
                    return '<span class="diff-removed">-' + (escapeHtml(line) || '&nbsp;') + '</span>';
                } else {
                    return '<span class="diff-added">+' + (escapeHtml(line) || '&nbsp;') + '</span>';
                }
            }).join('\n');
        }

        function parseCSVRows(text) {
            const rows = [];
            let currentRow = [];
            let currentCell = '';
            let inQuotes = false;
            
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentCell += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    currentRow.push(currentCell);
                    currentCell = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && nextChar === '\n') {
                        i++;
                    }
                    currentRow.push(currentCell);
                    rows.push(currentRow);
                    currentRow = [];
                    currentCell = '';
                } else {
                    currentCell += char;
                }
            }
            
            currentRow.push(currentCell);
            if (currentRow.length > 0) {
                rows.push(currentRow);
            }
            
            return rows;
        }

        function escapeCSV(cell) {
            cell = (cell || '').toString();
            if (cell.includes(',') || cell.includes('"') || cell.includes('\n') || cell.includes('\r')) {
                return '"' + cell.replace(/"/g, '""') + '"';
            }
            return cell;
        }

        function arrayToCSV(arr) {
            if (!arr || arr.length === 0) return '';
            return arr.map(row => row.map(cell => escapeCSV(cell)).join(',')).join('\n');
        }

        function getMaxCol(rows) {
            let max = 0;
            rows.forEach(row => { if (row.length > max) max = row.length; });
            return max;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function closeCsvDiff() {
            document.getElementById('csv-diff-overlay').classList.remove('active');
            pendingSaveContent = '';
        }

        async function confirmCsvSave() {
            closeCsvDiff();
            
            try {
                if (csvFileHandle.handle && window.showSaveFilePicker) {
                    const writable = await csvFileHandle.handle.createWritable();
                    await writable.write(pendingSaveContent);
                    await writable.close();
                    csvOriginalData = JSON.parse(JSON.stringify(csvData));
                    alert('保存成功');
                } else if (csvFileHandle.path) {
                    await saveCSVToPath(csvFileHandle.path);
                    csvOriginalData = JSON.parse(JSON.stringify(csvData));
                }
            } catch (e) {
                alert('保存失败: ' + e.message);
            }
        }

        function clearCSV() {
            csvData = [];
            csvFileHandle = null;
            csvHistory = [];
            csvOriginalData = null;
            document.getElementById('csv-file-input').value = '';
            document.getElementById('csv-file-path').textContent = '';
            renderCSVTable();
        }

        function addCsvRowBefore(index) {
            hideCsvContextMenu();
            saveCsvHistory();
            const colCount = csvData[0].length;
            const newRow = new Array(colCount).fill('');
            csvData.splice(index, 0, newRow);
            renderCSVTable();
        }

        function addCsvRowAfter(index) {
            hideCsvContextMenu();
            saveCsvHistory();
            const colCount = csvData[0].length;
            const newRow = new Array(colCount).fill('');
            csvData.splice(index + 1, 0, newRow);
            renderCSVTable();
        }

        function addCsvRowAfterHeader() {
            hideCsvContextMenu();
            saveCsvHistory();
            const colCount = csvData[0].length;
            const newRow = new Array(colCount).fill('');
            csvData.splice(1, 0, newRow);
            renderCSVTable();
        }

        function deleteCsvRowByIndex(index) {
            hideCsvContextMenu();
            saveCsvHistory();
            
            const container = csvVirtualScroll.container;
            const tbody = document.getElementById('csv-tbody');
            const scrollTopBefore = container.scrollTop;
            
            const topVisibleIndexBefore = csvVirtualScroll.startIndex;
            const topVisibleRowId = csvData[topVisibleIndexBefore] ? csvData[topVisibleIndexBefore][0] : null;
            
            const deletedRowEl = tbody.querySelector(`tr[data-row="${index}"]`);
            const deletedRowIsVisible = !!deletedRowEl;
            
            csvData.splice(index, 1);
            
            if (deletedRowIsVisible && deletedRowEl) {
                const deletedHeight = deletedRowEl.offsetHeight;
                deletedRowEl.remove();
                
                for (let i = index + 1; i <= csvData.length + 1; i++) {
                    const rowEl = tbody.querySelector(`tr[data-row="${i}"]`);
                    if (rowEl) {
                        rowEl.dataset.row = String(i - 1);
                    }
                }
                
                csvVirtualScroll.rowHeights.clear();
                Array.from(tbody.querySelectorAll('tr[data-row]')).forEach(rowEl => {
                    const i = parseInt(rowEl.dataset.row);
                    csvVirtualScroll.rowHeights.set(String(i), rowEl.offsetHeight);
                });
                
                csvVirtualScroll.totalHeight -= deletedHeight;
                
                // 修复：删除可视区域内行后，保持可视内容不变
                // 方法：保持原来的scrollTop不变，让getVisibleRange()自动计算正确的可见范围
                // 这样可视内容会显示相同的数据（只是行号变了，因为删除了某行）
                
                // 关键：删除可视区域行后，要保持可视内容不变
                // 需要渲染正确的可见行数
                // 注意：删除第n行后，原来第n+1行会变成第n行
                // 所以要设置 newStartIndex = topVisibleIndexBefore + 1
                const newStartIndex = topVisibleIndexBefore + 1;
                const visibleRowsCount = csvVirtualScroll.visibleRows;
                const newEndIndex = Math.min(csvData.length - 1, newStartIndex + visibleRowsCount - 1);
                
                container.scrollTop = scrollTopBefore;
                csvVirtualScroll.scrollTop = scrollTopBefore;
                
                // 调用renderVisibleRows，使用override参数强制设置可见范围
                renderVisibleRows(newStartIndex, newEndIndex);
                
                // 确保scrollTop不被改变
                container.scrollTop = scrollTopBefore;
                csvVirtualScroll.scrollTop = scrollTopBefore;
            } else {
                console.log('deleteCsvRowByIndex non-visible branch: index=', index, 'topVisibleIndexBefore=', topVisibleIndexBefore, 'topVisibleRowId=', topVisibleRowId, 'scrollTopBefore=', scrollTopBefore);
                ensureHeightsCachedUpTo(index - 1);
                
                let deletedHeight = csvVirtualScroll.rowHeights.get(String(index));
                if (deletedHeight === undefined) {
                    const tempRow = createTableRow(index);
                    tempRow.style.position = 'absolute';
                    tempRow.style.left = '-9999px';
                    document.body.appendChild(tempRow);
                    deletedHeight = tempRow.offsetHeight;
                    document.body.removeChild(tempRow);
                    csvVirtualScroll.rowHeights.set(String(index), deletedHeight);
                }
                
                csvVirtualScroll.rowHeights.delete(String(index));
                const newRowHeights = new Map();
                for (const [k, v] of csvVirtualScroll.rowHeights) {
                    const kNum = parseInt(k);
                    if (kNum > index) {
                        newRowHeights.set(String(kNum - 1), v);
                    } else if (kNum < index) {
                        newRowHeights.set(k, v);
                    }
                }
                csvVirtualScroll.rowHeights = newRowHeights;
                
                csvVirtualScroll.totalHeight -= deletedHeight;
                
                // 修复：直接保持scrollTop不变
                // 由于可视区域内的内容没有变化，只是行号变了
                // 保持scrollTop不变应该能保持可视内容不变
                console.log('deleteCsvRowByIndex: scrollTopBefore=', scrollTopBefore, 'topVisibleIndexBefore=', topVisibleIndexBefore, 'index=', index);
                
                container.scrollTop = scrollTopBefore;
                csvVirtualScroll.scrollTop = scrollTopBefore;
                
                // 让getVisibleRange自然地重新计算可见范围
                getVisibleRange();  // 重新计算可见范围
            }
        }

        function addCsvColumnBefore(index) {
            hideCsvContextMenu();
            saveCsvHistory();
            csvData.forEach(row => row.splice(index, 0, ''));
            renderCSVTable();
        }

        function addCsvColumnAfter(index) {
            hideCsvContextMenu();
            saveCsvHistory();
            csvData.forEach(row => row.splice(index + 1, 0, ''));
            renderCSVTable();
        }

        function deleteCsvColumnByIndex(index) {
            hideCsvContextMenu();
            if (csvData[0].length === 0) return;
            saveCsvHistory();
            csvData.forEach(row => row.splice(index, 1));
            renderCSVTable();
        }

        // DIY 工具
        let diyTools = [];

        async function loadDiyTools() {
            try {
                const response = await fetch('/api/diy-tools');
                diyTools = await response.json();
                
                diyTools.forEach((_, index) => {
                    const toolId = 'diy-' + index;
                    if (!snapshots[toolId]) {
                        snapshots[toolId] = [];
                    }
                });
                
                renderDiyTools();
            } catch (e) {
                console.error('加载自定义工具失败:', e);
            }
        }

        function renderDiyTools() {
            if (diyTools.length === 0) return;

            document.getElementById('diy-tools-section').style.display = 'block';

            const toolsList = document.getElementById('diy-tools-list');
            const panelsContainer = document.getElementById('diy-panels');
            toolsList.innerHTML = '';
            panelsContainer.innerHTML = '';

            const groups = {};
            diyTools.forEach((tool, index) => {
                const groupName = tool.group_name || '自定义工具';
                if (!groups[groupName]) {
                    groups[groupName] = [];
                }
                groups[groupName].push({ ...tool, originalIndex: index });
            });

            let toolIndex = 0;
            Object.keys(groups).forEach((groupName) => {
                const groupTools = groups[groupName];
                const groupId = 'diy-group-' + Object.keys(groups).indexOf(groupName);

                const groupItem = document.createElement('div');
                groupItem.className = 'tool-item';
                groupItem.dataset.tool = groupId;
                groupItem.textContent = groupName;
                groupItem.style.fontWeight = 'bold';
                toolsList.appendChild(groupItem);

                const panel = document.createElement('div');
                panel.id = groupId;
                panel.className = 'tool-panel';

                let toolsHtml = '';
                groupTools.forEach((tool) => {
                    const toolId = 'diy-' + tool.originalIndex;
                    let fieldsHtml = '';
                    tool.fields.forEach((field, i) => {
                        const fieldType = field.field_type || 'text';
                        if (fieldType === 'row') {
                            fieldsHtml += `
                                <label>${escapeHtml(field.field_name)}:</label>
                                <div class="input-group">
                                    <input type="text" id="${toolId}-field-${i}" placeholder="输入 ${escapeHtml(field.field_name)}...">
                                    <button class="copy-btn" onclick="copyToClipboard('${toolId}-field-${i}')">📋</button>
                                </div>
                            `;
                        } else {
                            fieldsHtml += `
                                <label>${escapeHtml(field.field_name)}:</label>
                                <div class="input-group">
                                    <textarea id="${toolId}-field-${i}" placeholder="输入 ${escapeHtml(field.field_name)}..."></textarea>
                                    <button class="copy-btn" onclick="copyToClipboard('${toolId}-field-${i}')">📋</button>
                                </div>
                            `;
                        }
                    });

                    toolsHtml += `
                        <div class="tool-title" style="margin-top: 20px;">${escapeHtml(tool.name)}</div>
                        ${fieldsHtml}
                        <button onclick="execDiyTool(${tool.originalIndex})">执行</button>
                        <button onclick="clearDiyTool(${tool.originalIndex})">清空</button>
                        <label>执行结果:</label>
                        <div class="output-group">
                            <div id="${toolId}-output" class="result"></div>
                            <button class="copy-btn" onclick="copyOutputToClipboard('${toolId}-output')">📋</button>
                        </div>
                    `;
                });

                const allToolIds = groupTools.map(t => 'diy-' + t.originalIndex).join(',');
                panel.innerHTML = `
                    <div class="tool-title">${escapeHtml(groupName)}</div>
                    <button class="snapshot-btn" onclick="saveDiyGroupSnapshot('${groupId}', '${allToolIds}')">💾 保存 Snapshot</button>
                    ${toolsHtml}
                `;

                panelsContainer.appendChild(panel);

                groupItem.addEventListener('click', () => {
                    switchTool(groupId);
                });
            });
        }

        async function execDiyTool(index) {
            const tool = diyTools[index];
            const toolId = 'diy-' + index;

            const args = [];
            tool.fields.forEach((field, i) => {
                const value = document.getElementById(`${toolId}-field-${i}`).value;
                args.push(value);
            });

            try {
                const response = await fetch('/api/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cmd: tool.cmd, args: args })
                });
                const result = await response.json();
                if (result.error) {
                    document.getElementById(`${toolId}-output`).textContent = '错误: ' + result.error + '\n' + result.output;
                } else {
                    document.getElementById(`${toolId}-output`).textContent = result.output;
                }
            } catch (e) {
                document.getElementById(`${toolId}-output`).textContent = '执行失败: ' + e.message;
            }
        }

        function clearDiyTool(index) {
            const tool = diyTools[index];
            const toolId = 'diy-' + index;
            tool.fields.forEach((field, i) => {
                document.getElementById(`${toolId}-field-${i}`).value = '';
            });
            document.getElementById(`${toolId}-output`).textContent = '';
        }

        function copyToClipboard(elementId) {
            const el = document.getElementById(elementId);
            const text = el.value || el.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = el.parentElement.querySelector('.copy-btn');
                if (btn) {
                    const originalText = btn.textContent;
                    btn.textContent = '✓';
                    setTimeout(() => btn.textContent = originalText, 1000);
                }
            });
        }

        function copyOutputToClipboard(elementId) {
            const el = document.getElementById(elementId);
            const text = el.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = el.parentElement.querySelector('.copy-btn');
                if (btn) {
                    const originalText = btn.textContent;
                    btn.textContent = '✓';
                    setTimeout(() => btn.textContent = originalText, 1000);
                }
            });
        }

        // Tab 键缩进支持
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Tab' && e.target.tagName === 'TEXTAREA') {
                e.preventDefault();
                const start = e.target.selectionStart;
                const end = e.target.selectionEnd;
                e.target.value = e.target.value.substring(0, start) + '    ' + e.target.value.substring(end);
                e.target.selectionStart = e.target.selectionEnd = start + 4;
            }
        });

        // 初始化
        loadSnapshots();
        
        const urlParams = new URLSearchParams(window.location.search);
        const toolParam = urlParams.get('tool');
        
        loadDiyTools().then(() => {
            if (toolParam) {
                switchTool(toolParam);
            }
        });
    </script>
